<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Asad Ali | Portfolio</title>
    <script>
      // Single-page-app fallback for GitHub Pages.
      // Rewrites /some/path?q=1#h into /?/some/path&q=1#h so index.html can restore it.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
